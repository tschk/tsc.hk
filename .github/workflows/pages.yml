name: Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  CREPUS_VERSION: v0.8.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        run: |
          VERSION=$(grep -A2 'name = "wasm-bindgen"' runtime/Cargo.lock | grep '^version' | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "wasm-bindgen $VERSION"
          cargo install wasm-bindgen-cli --version "$VERSION" --locked

      - name: Install crepus (precompiled)
        run: |
          BASE="https://github.com/tschk/crepuscularity/releases/download/${CREPUS_VERSION}"
          for attempt in $(seq 1 5); do
            if curl -fsSL -o crepus-x86_64-linux "${BASE}/crepus-x86_64-linux" \
              && curl -fsSL -o SHA256SUMS.txt "${BASE}/SHA256SUMS.txt"; then
              grep "crepus-x86_64-linux" SHA256SUMS.txt | sha256sum -c -
              mv crepus-x86_64-linux crepus
              chmod +x crepus
              echo "$PWD" >> "$GITHUB_PATH"
              exit 0
            fi
            echo "Attempt ${attempt}: waiting for ${CREPUS_VERSION} release assets..."
            sleep 10
          done
          echo "Precompiled binary unavailable, building crepuscularity-cli from crates.io"
          cargo install crepuscularity-cli --version 0.8.0 --no-default-features --locked
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build site
        run: crepus web build --site .

      - name: Copy agent-readable files
        run: cp llms.txt llms-full.txt agent.md README.md robots.txt dist/

      - name: Verify artifacts
        run: |
          test -f dist/index.html
          test -f dist/.nojekyll
          test -f dist/pkg/runtime_bg.wasm
          test -f dist/vendor/unocss.js
          test -f dist/llms.txt
          test -f dist/llms-full.txt
          test -f dist/agent.md
          test -f dist/README.md
          test -f dist/robots.txt
          echo "✓ all artifacts present"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
