name: Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  CREPUS_VERSION: v0.8.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        run: |
          VERSION=$(grep -A2 'name = "wasm-bindgen"' runtime/Cargo.lock | grep '^version' | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "wasm-bindgen $VERSION"
          cargo install wasm-bindgen-cli --version "$VERSION" --locked

      - name: Install crepus (precompiled)
        run: |
          URL="https://github.com/tschk/crepuscularity/releases/download/${CREPUS_VERSION}/crepus-x86_64-linux"
          for attempt in $(seq 1 20); do
            if curl -fsSL -o crepus "$URL"; then
              chmod +x crepus
              echo "$PWD" >> "$GITHUB_PATH"
              exit 0
            fi
            echo "Attempt ${attempt}: waiting for ${CREPUS_VERSION} binary..."
            sleep 30
          done
          echo "Failed to download precompiled crepus"
          exit 1

      - name: Build site
        run: crepus web build --site .

      - name: Verify artifacts
        run: |
          test -f dist/index.html
          test -f dist/.nojekyll
          test -f dist/pkg/runtime_bg.wasm
          test -f dist/vendor/unocss.js
          echo "✓ all artifacts present"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4