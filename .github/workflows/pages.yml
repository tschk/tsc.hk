name: Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  CREPUS_REV: d717755

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        run: |
          VERSION=$(grep -A2 'name = "wasm-bindgen"' runtime/Cargo.lock | grep '^version' | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "wasm-bindgen $VERSION"
          cargo install wasm-bindgen-cli --version "$VERSION" --locked

      - name: Install crepus
        run: |
          cargo install --git https://github.com/tschk/crepuscularity --rev "$CREPUS_REV" crepuscularity-cli --no-default-features --locked
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build site
        run: crepus web build --site .

      - name: Copy agent-readable files
        run: |
          cp robots.txt dist/
          if ! test -f dist/llms-full.txt; then
            cp llms.txt llms-full.txt agent.md dist/
          fi

      - name: Verify artifacts
        run: |
          test -f dist/index.html
          test -f dist/.nojekyll
          test -f dist/pkg/runtime_bg.wasm
          test -f dist/vendor/unocss.js
          test -f dist/llms.txt
          test -f dist/llms-full.txt
          test -f dist/agent.md
          test -f dist/robots.txt
          echo "✓ all artifacts present"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
